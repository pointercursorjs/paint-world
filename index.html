<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paint world</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f4f0;
  --ink: #1a1a1a;
  --accent: #ff4d4d;
  --panel: #ffffff;
  --border: #e0ddd5;
}
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  height: 50px;
  background: var(--panel);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  flex-shrink: 0;
}
.logo { font-weight: 900; font-size: 20px; letter-spacing: -0.5px; color: var(--ink); }
.logo span { color: var(--accent); }

.workspace {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #f0ede8;
}
#canvas {
  display: block;
  cursor: crosshair;
  touch-action: none;
  background: #fff;
  width: 100%;
  height: 100%;
}
#cursors {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}

.toolbar {
  height: 64px;
  background: var(--panel);
  border-top: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 16px;
  flex-shrink: 0;
  overflow-x: auto;
}
.toolbar::-webkit-scrollbar { display: none; }
.sep { width: 1.5px; height: 32px; background: var(--border); border-radius: 2px; flex-shrink: 0; margin: 0 4px; }
.tool-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--ink);
  transition: all .15s; flex-shrink: 0;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  transition: transform .15s, border-color .15s; flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.18); }
.color-swatch.selected { border-color: var(--ink); }
.size-slider { width: 80px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.color-picker-wrap { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
.color-picker-wrap input { opacity: 0; position: absolute; inset: 0; cursor: pointer; width: 100%; height: 100%; }
.color-picker-icon {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px dashed #bbb;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #888; pointer-events: none;
}

/* CURSOR LABELS */
.cursor-label {
  position: absolute;
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transform: translate(-50%, calc(-100% - 10px));
}
.cursor-label .name-tag {
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; white-space: nowrap;
}
.cursor-label .cursor-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* MODAL BIENVENIDA */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  text-align: center;
}
.modal h2 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: var(--ink); }
.modal h2 span { color: var(--accent); }
.modal p { font-size: 13px; color: #888; }
.modal .id-badge {
  font-size: 28px; font-weight: 900; letter-spacing: 4px;
  padding: 12px 24px;
  border-radius: 14px;
  color: #fff;
}
.modal-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
  cursor: pointer; transition: opacity .15s;
}
.modal-btn:hover { opacity: 0.85; }

/* MODAL MOBILE */
.mobile-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 9999;
}
.mobile-overlay.show { display: flex; }
.mobile-modal {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  width: 300px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-align: center;
}
.mobile-modal i { font-size: 40px; color: var(--accent); }
.mobile-modal h2 { font-size: 20px; font-weight: 900; color: var(--ink); }
.mobile-modal h2 span { color: var(--accent); }
.mobile-modal p { font-size: 13px; color: #888; }
</style>
</head>
<body>

<!-- MODAL BIENVENIDA -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>paint <span>world</span></h2>
    <p>este es tu id para esta sesión 👀</p>
    <div class="id-badge" id="id-badge"></div>
    <p style="font-size:12px;color:#bbb">cada vez que abres una pestaña nueva te toca uno diferente</p>
    <button class="modal-btn" id="modal-btn">empezar a dibujar</button>
  </div>
</div>

<!-- MODAL MOBILE -->
<div class="mobile-overlay" id="mobile-overlay">
  <div class="mobile-modal">
    <i class="fa-solid fa-mobile-screen"></i>
    <h2>paint <span>world</span></h2>
    <p>paint world no está disponible para celulares o tablets, entra desde una computadora</p>
  </div>
</div>

<header>
  <div class="logo">paint <span>world</span></div>
</header>

<div class="workspace" id="workspace">
  <canvas id="canvas"></canvas>
  <div id="cursors"></div>
</div>

<div class="toolbar">
  <button class="tool-btn active" id="btn-pen"><i class="fa-solid fa-pen"></i></button>
  <button class="tool-btn" id="btn-eraser"><i class="fa-solid fa-eraser"></i></button>
  <button class="tool-btn" id="btn-clear"><i class="fa-solid fa-trash"></i></button>
  <div class="sep"></div>
  <i class="fa-solid fa-circle" style="font-size:8px;color:#aaa;flex-shrink:0"></i>
  <input type="range" min="1" max="40" value="5" class="size-slider" id="size-slider">
  <i class="fa-solid fa-circle" style="font-size:16px;color:#aaa;flex-shrink:0"></i>
  <div class="sep"></div>
  <div class="color-swatch selected" style="background:#1a1a1a" data-color="#1a1a1a"></div>
  <div class="color-swatch" style="background:#ff4d4d" data-color="#ff4d4d"></div>
  <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
  <div class="color-swatch" style="background:#22c55e" data-color="#22c55e"></div>
  <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
  <div class="color-swatch" style="background:#a855f7" data-color="#a855f7"></div>
  <div class="color-swatch" style="background:#f97316" data-color="#f97316"></div>
  <div class="color-swatch" style="background:#ec4899" data-color="#ec4899"></div>
  <div class="color-swatch" style="background:#ffffff;outline:1.5px solid #ccc;outline-offset:1px" data-color="#ffffff"></div>
  <div class="sep"></div>
  <div class="color-picker-wrap">
    <div class="color-picker-icon"><i class="fa-solid fa-palette"></i></div>
    <input type="color" id="custom-color" value="#ff4d4d">
  </div>
</div>

<script>
const WS_URL = location.hostname === 'localhost' ? 'ws://localhost:3001' : 'wss://' + location.hostname;

// ── ID RANDOM POR PESTAÑA, LABEL RANDOM TAMBIÉN ──
const myId    = Math.random().toString(36).slice(2, 8).toUpperCase();
const myColor = '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');

// ── CANVAS ──
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const workspace = document.getElementById('workspace');

function resizeCanvas() {
  canvas.width  = workspace.offsetWidth;
  canvas.height = workspace.offsetHeight;
  redrawAll();
}
window.addEventListener('resize', resizeCanvas);

// ── VISTA (pan/zoom) ──
let offsetX = 0, offsetY = 0, scale = 1;
function toWorld(sx, sy) { return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale }; }
function toScreen(wx, wy) { return { x: wx * scale + offsetX, y: wy * scale + offsetY }; }

// ── ESTADO ──
let tool = 'pen', color = '#1a1a1a', size = 5;
let isDrawing = false, lastX = 0, lastY = 0;
const allStrokes = {};

function drawSeg(x0, y0, x1, y1, c, s, erase) {
  const a = toScreen(x0, y0), b = toScreen(x1, y1);
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = erase ? '#ffffff' : c;
  ctx.lineWidth   = s * scale;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.stroke();
}
function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const id in allStrokes)
    for (const s of allStrokes[id])
      drawSeg(s.x0, s.y0, s.x1, s.y1, s.color, s.size, s.erase);
}

// ── WEBSOCKET ──
let ws = null, wsReady = false;
function connectWS() {
  try { ws = new WebSocket(WS_URL); } catch { return; }
  ws.onopen = () => {
    wsReady = true;
    ws.send(JSON.stringify({ type: 'hello', id: myId }));
  };
  ws.onclose = () => { wsReady = false; setTimeout(connectWS, 3000); };
  ws.onerror = () => { wsReady = false; };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'batch') { msg.items.forEach(handleMsg); return; }
    handleMsg(msg);
  };
}

function handleMsg(msg) {
  if (msg.type === 'init') {
    for (const [id, segs] of Object.entries(msg.strokes || {}))
      allStrokes[id] = segs;
    resizeCanvas();
  }
  if (msg.type === 'draw') {
    if (msg.id === myId) return;
    if (!allStrokes[msg.id]) allStrokes[msg.id] = [];
    allStrokes[msg.id].push({ x0: msg.x0, y0: msg.y0, x1: msg.x1, y1: msg.y1, color: msg.color, size: msg.size, erase: msg.erase });
    drawSeg(msg.x0, msg.y0, msg.x1, msg.y1, msg.color, msg.size, msg.erase);
  }
  if (msg.type === 'clear') {
    delete allStrokes[msg.id];
    removeCursor(msg.id);
    redrawAll();
  }
  if (msg.type === 'clear_all') {
    for (const id in allStrokes) delete allStrokes[id];
    for (const id in remoteCursors) removeCursor(id);
    redrawAll();
  }
  if (msg.type === 'cursor') {
    updateCursor(msg.id, msg.id, msg.color, msg.x, msg.y);
  }
}

// ── ZOOM ──
workspace.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(Math.max(scale * factor, 0.05), 10);
  const rect = workspace.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  offsetX = mx - (mx - offsetX) * (newScale / scale);
  offsetY = my - (my - offsetY) * (newScale / scale);
  scale = newScale;
  redrawAll();
}, { passive: false });

// ── PAN Y DIBUJO ──
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let spaceDown = false, lastCursorSend = 0;

window.addEventListener('keydown', e => { if (e.code === 'Space') { spaceDown = true; workspace.style.cursor = 'grab'; e.preventDefault(); } });
window.addEventListener('keyup',   e => { if (e.code === 'Space') { spaceDown = false; workspace.style.cursor = ''; canvas.style.cursor = 'crosshair'; } });

workspace.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2 || spaceDown) {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOriginX = offsetX; panOriginY = offsetY;
    workspace.style.cursor = 'grabbing';
    e.preventDefault(); return;
  }
  if (e.button === 0) {
    isDrawing = true;
    const rect = workspace.getBoundingClientRect();
    const p = toWorld(e.clientX - rect.left, e.clientY - rect.top);
    lastX = p.x; lastY = p.y;
  }
});

window.addEventListener('mousemove', e => {
  const rect = workspace.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  if (isPanning) {
    offsetX = panOriginX + (e.clientX - panStartX);
    offsetY = panOriginY + (e.clientY - panStartY);
    redrawAll(); return;
  }

  // tu propio cursor label
  updateCursor('__me__', myId, myColor, sx, sy);

  // mandar cursor a los demás
  const now = Date.now();
  if (wsReady && now - lastCursorSend > 32) {
    lastCursorSend = now;
    ws.send(JSON.stringify({ type: 'cursor', id: myId, color: myColor, x: sx, y: sy }));
  }

  if (!isDrawing) return;
  const { x, y } = toWorld(sx, sy);
  const erase = tool === 'eraser';
  const c = erase ? '#ffffff' : color;
  if (!allStrokes[myId]) allStrokes[myId] = [];
  allStrokes[myId].push({ x0: lastX, y0: lastY, x1: x, y1: y, color: c, size, erase });
  drawSeg(lastX, lastY, x, y, c, size, erase);
  if (wsReady) ws.send(JSON.stringify({ type: 'draw', id: myId, x0: lastX, y0: lastY, x1: x, y1: y, color: c, size, erase }));
  lastX = x; lastY = y;
});

window.addEventListener('mouseup', () => {
  isDrawing = false; isPanning = false;
  workspace.style.cursor = spaceDown ? 'grab' : '';
  canvas.style.cursor = 'crosshair';
});

workspace.addEventListener('contextmenu', e => e.preventDefault());

// ── TOUCH ──
let lastPinchDist = 0, touchDrawing = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    touchDrawing = false; isPanning = true;
    panStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    panStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    panOriginX = offsetX; panOriginY = offsetY;
    lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    return;
  }
  touchDrawing = true;
  const rect = workspace.getBoundingClientRect();
  const p = toWorld(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
  lastX = p.x; lastY = p.y;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && isPanning) {
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const rect = workspace.getBoundingClientRect();
    const newScale = Math.min(Math.max(scale * (dist / lastPinchDist), 0.05), 10);
    offsetX = (cx - rect.left) - ((cx - rect.left) - offsetX) * (newScale / scale);
    offsetY = (cy - rect.top)  - ((cy - rect.top)  - offsetY) * (newScale / scale);
    scale = newScale; lastPinchDist = dist;
    redrawAll(); return;
  }
  if (!touchDrawing) return;
  const rect = workspace.getBoundingClientRect();
  const { x, y } = toWorld(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
  const erase = tool === 'eraser';
  const c = erase ? '#ffffff' : color;
  if (!allStrokes[myId]) allStrokes[myId] = [];
  allStrokes[myId].push({ x0: lastX, y0: lastY, x1: x, y1: y, color: c, size, erase });
  drawSeg(lastX, lastY, x, y, c, size, erase);
  if (wsReady) ws.send(JSON.stringify({ type: 'draw', id: myId, x0: lastX, y0: lastY, x1: x, y1: y, color: c, size, erase }));
  lastX = x; lastY = y;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) isPanning = false;
  if (e.touches.length === 0) touchDrawing = false;
});

// ── CURSORS ──
const cursorsEl   = document.getElementById('cursors');
const remoteCursors = {};

function updateCursor(id, label, col, sx, sy) {
  if (!remoteCursors[id]) {
    const el  = document.createElement('div');
    el.className = 'cursor-label';
    const tag = document.createElement('div');
    tag.className = 'name-tag';
    const dot = document.createElement('div');
    dot.className = 'cursor-dot';
    el.appendChild(tag);
    el.appendChild(dot);
    cursorsEl.appendChild(el);
    remoteCursors[id] = { el, tag, dot };
  }
  const { el, tag, dot } = remoteCursors[id];
  tag.textContent      = label;
  tag.style.background = col;
  dot.style.background = col;
  el.style.left = sx + 'px';
  el.style.top  = sy + 'px';
}

function removeCursor(id) {
  if (remoteCursors[id]) { remoteCursors[id].el.remove(); delete remoteCursors[id]; }
}

// ── TOOLBAR ──
document.getElementById('btn-pen').addEventListener('click', () => setTool('pen'));
document.getElementById('btn-eraser').addEventListener('click', () => setTool('eraser'));
document.getElementById('btn-clear').addEventListener('click', () => {
  delete allStrokes[myId]; redrawAll();
  if (wsReady) ws.send(JSON.stringify({ type: 'clear', id: myId }));
});
document.getElementById('size-slider').addEventListener('input', e => size = +e.target.value);
document.querySelectorAll('.color-swatch').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    color = el.dataset.color;
    setTool('pen');
  });
});
document.getElementById('custom-color').addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  setTool('pen');
});
function setTool(t) {
  tool = t;
  document.getElementById('btn-pen').classList.toggle('active', t === 'pen');
  document.getElementById('btn-eraser').classList.toggle('active', t === 'eraser');
}

// mostrar modal con el id del usuario
const badge = document.getElementById('id-badge');
badge.textContent = myId;
badge.style.background = myColor;

document.getElementById('modal-btn').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
  connectWS();
});

resizeCanvas();
</script>
</body>
</html>
