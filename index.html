<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paint world</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f4f0;
  --ink: #1a1a1a;
  --accent: #ff4d4d;
  --panel: #ffffff;
  --border: #e0ddd5;
}
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  height: 50px;
  background: var(--panel);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  flex-shrink: 0;
}
.logo { font-weight: 900; font-size: 20px; letter-spacing: -0.5px; color: var(--ink); }
.logo span { color: var(--accent); }

.workspace {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #e8e5e0;
  cursor: crosshair;
}
#canvas {
  position: absolute;
  top: 0; left: 0;
  image-rendering: pixelated;
}
#grid-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  image-rendering: pixelated;
  opacity: 0.15;
}
#cursors {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}
#hover-pixel {
  position: absolute;
  pointer-events: none;
  z-index: 99;
  border: 2px solid rgba(0,0,0,0.4);
  background: transparent;
}

.toolbar {
  height: 64px;
  background: var(--panel);
  border-top: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 16px;
  flex-shrink: 0;
  overflow-x: auto;
}
.toolbar::-webkit-scrollbar { display: none; }
.sep { width: 1.5px; height: 32px; background: var(--border); border-radius: 2px; flex-shrink: 0; margin: 0 4px; }
.tool-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--ink);
  transition: all .15s; flex-shrink: 0;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  transition: transform .15s, border-color .15s; flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.18); }
.color-swatch.selected { border-color: var(--ink); }
.color-picker-wrap { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
.color-picker-wrap input { opacity: 0; position: absolute; inset: 0; cursor: pointer; width: 100%; height: 100%; }
.color-picker-icon {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px dashed #bbb;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #888; pointer-events: none;
}

/* MODAL BIENVENIDA */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  text-align: center;
}
.modal h2 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: var(--ink); }
.modal h2 span { color: var(--accent); }
.modal p { font-size: 13px; color: #888; }
.modal .id-badge {
  font-size: 28px; font-weight: 900; letter-spacing: 4px;
  padding: 12px 24px;
  border-radius: 14px;
  color: #fff;
}
.modal-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
  cursor: pointer; transition: opacity .15s;
}
.modal-btn:hover { opacity: 0.85; }

/* MODAL MOBILE */
.mobile-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 9999;
}
.mobile-overlay.show { display: flex; }
.mobile-modal {
  background: #fff; border-radius: 20px;
  padding: 36px 32px; width: 300px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-align: center;
}
.mobile-modal i { font-size: 40px; color: var(--accent); }
.mobile-modal h2 { font-size: 20px; font-weight: 900; color: var(--ink); }
.mobile-modal h2 span { color: var(--accent); }
.mobile-modal p { font-size: 13px; color: #888; }

/* CURSOR LABELS */
.cursor-label {
  position: absolute;
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transform: translate(-50%, calc(-100% - 10px));
}
.cursor-label .name-tag {
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; white-space: nowrap;
}
.cursor-label .cursor-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<!-- MODAL MOBILE -->
<div class="mobile-overlay" id="mobile-overlay">
  <div class="mobile-modal">
    <i class="fa-solid fa-mobile-screen"></i>
    <h2>paint <span>world</span></h2>
    <p>paint world no está disponible para celulares o tablets, entra desde una computadora</p>
  </div>
</div>

<!-- MODAL BIENVENIDA -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>paint <span>world</span></h2>
    <p>este es tu id para esta sesión</p>
    <div class="id-badge" id="id-badge"></div>
    <p style="font-size:12px;color:#bbb">cada vez que abres una pestaña nueva te toca uno diferente</p>
    <button class="modal-btn" id="modal-btn">empezar a dibujar</button>
  </div>
</div>

<header>
  <div class="logo">paint <span>world</span></div>
</header>

<div class="workspace" id="workspace">
  <canvas id="canvas"></canvas>
  <canvas id="grid-canvas"></canvas>
  <div id="hover-pixel"></div>
  <div id="cursors"></div>
</div>

<div class="toolbar">
  <button class="tool-btn active" id="btn-pen"><i class="fa-solid fa-pen"></i></button>
  <button class="tool-btn" id="btn-eraser"><i class="fa-solid fa-eraser"></i></button>
  <button class="tool-btn" id="btn-clear"><i class="fa-solid fa-trash"></i></button>
  <div class="sep"></div>
  <div class="color-swatch selected" style="background:#1a1a1a" data-color="#1a1a1a"></div>
  <div class="color-swatch" style="background:#ffffff;outline:1.5px solid #ccc;outline-offset:1px" data-color="#ffffff"></div>
  <div class="color-swatch" style="background:#ff4d4d" data-color="#ff4d4d"></div>
  <div class="color-swatch" style="background:#f97316" data-color="#f97316"></div>
  <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
  <div class="color-swatch" style="background:#22c55e" data-color="#22c55e"></div>
  <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
  <div class="color-swatch" style="background:#a855f7" data-color="#a855f7"></div>
  <div class="color-swatch" style="background:#ec4899" data-color="#ec4899"></div>
  <div class="color-swatch" style="background:#e5e7eb" data-color="#e5e7eb"></div>
  <div class="color-swatch" style="background:#6b7280" data-color="#6b7280"></div>
  <div class="color-swatch" style="background:#92400e" data-color="#92400e"></div>
  <div class="sep"></div>
  <div class="color-picker-wrap">
    <div class="color-picker-icon"><i class="fa-solid fa-palette"></i></div>
    <input type="color" id="custom-color" value="#ff4d4d">
  </div>
</div>

<script>
const WS_URL = location.hostname === 'localhost' ? 'ws://localhost:3001' : 'wss://' + location.hostname;
const PIXEL_SIZE = 16; // tamaño de cada pixel en pantalla a escala 1

// ── ID RANDOM POR PESTAÑA ──
const myId    = Math.random().toString(36).slice(2, 8).toUpperCase();
const myColor = '#' + Math.floor(Math.random() * 0xb0b0b0 + 0x404040).toString(16).padStart(6, '0');

// ── CANVAS ──
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const gridCanvas = document.getElementById('grid-canvas');
const gridCtx   = gridCanvas.getContext('2d');
const workspace = document.getElementById('workspace');
const hoverEl   = document.getElementById('hover-pixel');

// ── VISTA ──
let offsetX = 0, offsetY = 0, scale = 1;

// el canvas es "infinito" — guardamos pixels como mapa {x,y -> color}
const pixels = {}; // key: "x,y" -> color hex
const myPixels = new Set(); // keys de pixels que YO pinte

function pixelKey(x, y) { return x + ',' + y; }

function worldToPixel(wx, wy) {
  return { px: Math.floor(wx / PIXEL_SIZE), py: Math.floor(wy / PIXEL_SIZE) };
}

function screenToWorld(sx, sy) {
  return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale };
}

function pixelToScreen(px, py) {
  return {
    sx: px * PIXEL_SIZE * scale + offsetX,
    sy: py * PIXEL_SIZE * scale + offsetY
  };
}

// tamaño del canvas = workspace
function resizeCanvas() {
  canvas.width = gridCanvas.width = workspace.offsetWidth;
  canvas.height = gridCanvas.height = workspace.offsetHeight;
  redraw();
  drawGrid();
}
window.addEventListener('resize', resizeCanvas);

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // calcular rango visible
  const { x: x0, y: y0 } = screenToWorld(0, 0);
  const { x: x1, y: y1 } = screenToWorld(canvas.width, canvas.height);
  const px0 = Math.floor(x0 / PIXEL_SIZE) - 1;
  const py0 = Math.floor(y0 / PIXEL_SIZE) - 1;
  const px1 = Math.ceil(x1 / PIXEL_SIZE) + 1;
  const py1 = Math.ceil(y1 / PIXEL_SIZE) + 1;

  const ps = PIXEL_SIZE * scale;
  for (let py = py0; py <= py1; py++) {
    for (let px = px0; px <= px1; px++) {
      const c = pixels[pixelKey(px, py)];
      if (!c) continue;
      ctx.fillStyle = c;
      ctx.fillRect(
        Math.round(px * ps + offsetX),
        Math.round(py * ps + offsetY),
        Math.ceil(ps), Math.ceil(ps)
      );
    }
  }
}

function drawGrid() {
  gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  const ps = PIXEL_SIZE * scale;
  if (ps < 4) return; // no dibujar grid si muy zoom out
  gridCtx.strokeStyle = '#000';
  gridCtx.lineWidth = 0.5;
  // lineas verticales
  const startX = ((offsetX % ps) + ps) % ps;
  for (let x = startX; x <= gridCanvas.width; x += ps) {
    gridCtx.beginPath();
    gridCtx.moveTo(x, 0);
    gridCtx.lineTo(x, gridCanvas.height);
    gridCtx.stroke();
  }
  // lineas horizontales
  const startY = ((offsetY % ps) + ps) % ps;
  for (let y = startY; y <= gridCanvas.height; y += ps) {
    gridCtx.beginPath();
    gridCtx.moveTo(0, y);
    gridCtx.lineTo(gridCanvas.width, y);
    gridCtx.stroke();
  }
}

function paintPixel(px, py, c) {
  if (c === null) {
    delete pixels[pixelKey(px, py)];
  } else {
    pixels[pixelKey(px, py)] = c;
  }
  // redibujar solo ese pixel
  const ps = PIXEL_SIZE * scale;
  const sx = Math.round(px * ps + offsetX);
  const sy = Math.round(py * ps + offsetY);
  ctx.clearRect(sx, sy, Math.ceil(ps) + 1, Math.ceil(ps) + 1);
  if (c) {
    ctx.fillStyle = c;
    ctx.fillRect(sx, sy, Math.ceil(ps), Math.ceil(ps));
  }
}

// ── WEBSOCKET ──
let ws = null, wsReady = false;

function connectWS() {
  try { ws = new WebSocket(WS_URL); } catch { return; }
  ws.onopen = () => {
    wsReady = true;
    ws.send(JSON.stringify({ type: 'hello', id: myId }));
  };
  ws.onclose = () => { wsReady = false; setTimeout(connectWS, 3000); };
  ws.onerror = () => { wsReady = false; };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'batch') { msg.items.forEach(handleMsg); return; }
    handleMsg(msg);
  };
}

function handleMsg(msg) {
  if (msg.type === 'init') {
    // cargar pixels del server
    const data = msg.pixels || {};
    for (const key in data) pixels[key] = data[key];
    resizeCanvas();
  }
  if (msg.type === 'pixel') {
    if (msg.id === myId) return;
    paintPixel(msg.px, msg.py, msg.color);
  }
  if (msg.type === 'clear_user') {
    // el server manda el canvas actualizado sin los pixels del usuario
    for (const key in pixels) delete pixels[key];
    for (const key in (msg.pixels || {})) pixels[key] = msg.pixels[key];
    removeCursor(msg.id);
    redraw();
  }
  if (msg.type === 'clear_all') {
    for (const key in pixels) delete pixels[key];
    for (const id in remoteCursors) removeCursor(id);
    redraw();
  }
  if (msg.type === 'cursor') {
    const lsx = msg.wx * PIXEL_SIZE * scale + offsetX;
    const lsy = msg.wy * PIXEL_SIZE * scale + offsetY;
    updateCursor(msg.id, msg.id, msg.color, lsx, lsy, msg.wx, msg.wy);
  }
}

// ── ZOOM ──
workspace.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.85 : 1.18;
  const newScale = Math.min(Math.max(scale * factor, 0.2), 40);
  const rect = workspace.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  offsetX = mx - (mx - offsetX) * (newScale / scale);
  offsetY = my - (my - offsetY) * (newScale / scale);
  scale = newScale;
  redraw();
  drawGrid();
  refreshRemoteCursors();
}, { passive: false });

// ── PAN Y DIBUJO ──
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let spaceDown = false, isMouseDown = false;
let lastCursorSend = 0;
let tool = 'pen', color = '#1a1a1a';

window.addEventListener('keydown', e => {
  if (e.code === 'Space') { spaceDown = true; workspace.style.cursor = 'grab'; e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; workspace.style.cursor = 'crosshair'; }
});

function getPixelFromEvent(e) {
  const rect = workspace.getBoundingClientRect();
  const { x, y } = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  return worldToPixel(x, y);
}

function doPixel(e) {
  const { px, py } = getPixelFromEvent(e);
  const c = tool === 'eraser' ? null : color;
  paintPixel(px, py, c);
  if (c === null) myPixels.delete(pixelKey(px, py));
  else myPixels.add(pixelKey(px, py));
  if (wsReady) ws.send(JSON.stringify({ type: 'pixel', id: myId, px, py, color: c }));
}

workspace.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2 || spaceDown) {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOriginX = offsetX; panOriginY = offsetY;
    workspace.style.cursor = 'grabbing';
    e.preventDefault(); return;
  }
  if (e.button === 0) {
    isMouseDown = true;
    doPixel(e);
  }
});

workspace.addEventListener('mousemove', e => {
  const rect = workspace.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  if (isPanning) {
    offsetX = panOriginX + (e.clientX - panStartX);
    offsetY = panOriginY + (e.clientY - panStartY);
    redraw(); drawGrid(); refreshRemoteCursors(); return;
  }

  // hover pixel highlight
  const { x, y } = screenToWorld(sx, sy);
  const { px, py } = worldToPixel(x, y);
  const ps = PIXEL_SIZE * scale;
  const hsx = Math.round(px * ps + offsetX);
  const hsy = Math.round(py * ps + offsetY);
  hoverEl.style.left   = hsx + 'px';
  hoverEl.style.top    = hsy + 'px';
  hoverEl.style.width  = Math.ceil(ps) + 'px';
  hoverEl.style.height = Math.ceil(ps) + 'px';

  // no mostramos nuestro propio cursor label, solo los de los demás

  // mandar cursor a los demás
  const now = Date.now();
  if (wsReady && now - lastCursorSend > 32) {
    lastCursorSend = now;
    const { x: wx, y: wy } = screenToWorld(sx, sy);
    ws.send(JSON.stringify({ type: 'cursor', id: myId, color: myColor, wx, wy }));
  }

  if (isMouseDown) doPixel(e);
});

window.addEventListener('mouseup', () => {
  isMouseDown = false; isPanning = false;
  workspace.style.cursor = spaceDown ? 'grab' : 'crosshair';
});

workspace.addEventListener('mouseleave', () => {
  hoverEl.style.width = '0'; hoverEl.style.height = '0';
});

workspace.addEventListener('contextmenu', e => e.preventDefault());

// ── CURSORS ──
const cursorsEl = document.getElementById('cursors');
const remoteCursors = {};

function updateCursor(id, label, col, sx, sy, wx, wy) {
  if (!remoteCursors[id]) {
    const el  = document.createElement('div');
    el.className = 'cursor-label';
    const tag = document.createElement('div'); tag.className = 'name-tag';
    const dot = document.createElement('div'); dot.className = 'cursor-dot';
    el.appendChild(tag); el.appendChild(dot);
    cursorsEl.appendChild(el);
    remoteCursors[id] = { el, tag, dot, wx: 0, wy: 0 };
  }
  const c = remoteCursors[id];
  c.tag.textContent = label;
  c.tag.style.background = col;
  c.dot.style.background = col;
  if (wx !== undefined) { c.wx = wx; c.wy = wy; }
  c.el.style.left = sx + 'px';
  c.el.style.top  = sy + 'px';
}

// recalcular posicion de todos los cursores remotos (pa cuando haces pan/zoom)
function refreshRemoteCursors() {
  for (const id in remoteCursors) {
    if (id === '__me__') continue;
    const c = remoteCursors[id];
    const lsx = c.wx * PIXEL_SIZE * scale + offsetX;
    const lsy = c.wy * PIXEL_SIZE * scale + offsetY;
    c.el.style.left = lsx + 'px';
    c.el.style.top  = lsy + 'px';
  }
}

function removeCursor(id) {
  if (remoteCursors[id]) { remoteCursors[id].el.remove(); delete remoteCursors[id]; }
}

// ── TOOLBAR ──
document.getElementById('btn-pen').addEventListener('click', () => setTool('pen'));
document.getElementById('btn-eraser').addEventListener('click', () => setTool('eraser'));
document.getElementById('btn-clear').addEventListener('click', () => {
  // borrar solo MIS pixels localmente
  for (const key of myPixels) delete pixels[key];
  myPixels.clear();
  redraw();
  if (wsReady) ws.send(JSON.stringify({ type: 'clear', id: myId }));
});
document.querySelectorAll('.color-swatch').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    color = el.dataset.color;
    setTool('pen');
  });
});
document.getElementById('custom-color').addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  setTool('pen');
});
function setTool(t) {
  tool = t;
  document.getElementById('btn-pen').classList.toggle('active', t === 'pen');
  document.getElementById('btn-eraser').classList.toggle('active', t === 'eraser');
}

// ── MODAL ──
const badge = document.getElementById('id-badge');
badge.textContent = myId;
badge.style.background = myColor;
document.getElementById('modal-btn').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
  connectWS();
});

// ── MOBILE ──
const isMobile = /Mobi|Android|iPad|iPhone|Tablet/i.test(navigator.userAgent) || window.innerWidth < 768;
if (isMobile) document.getElementById('mobile-overlay').classList.add('show');

resizeCanvas();
</script>
</body>
</html>
